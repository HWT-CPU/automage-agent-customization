[runtime]
environment = "local"
backend_mode = "http"
audit_enabled = true
audit_org_id = 0
api_base_url = "http://localhost:8000"
api_timeout_seconds = 10
retry_backoff_seconds = [1, 2, 4, 8, 16]
max_schema_correction_attempts = 2
auth_token = ""
openclaw_enabled = false
feishu_enabled = false
feishu_app_id = ""
feishu_app_secret = ""

[postgres]
host = "localhost"
port = 5432
database = "automage"
user = "automage"
password = ""
sslmode = "prefer"

